<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Grid</title>
  <style>
    :root {
      --bg: #111111; --bg2: #1a1a1a; --bg3: #2a2a2a;
      --text: #cccccc; --text-dim: #888888;
      --accent: #44aaff; --accent2: #ffff44;
      --border: #333333; --success: #44ff44; --error: #ff5555;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      -webkit-app-region: drag;
    }
    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    #mode-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .mode-btn {
      padding: 3px 12px;
      background: var(--bg2);
      color: var(--text-dim);
      border: none;
      font-family: monospace;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .mode-btn + .mode-btn { border-left: 1px solid var(--border); }
    .mode-btn.active { background: var(--accent); color: var(--bg); }
    #reroll-btn {
      padding: 3px 10px;
      background: var(--bg2);
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.75rem;
      cursor: pointer;
      display: none;
    }
    #reroll-btn:hover { filter: brightness(1.3); }
    #grid {
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 4px;
      padding: 16px;
      -webkit-app-region: no-drag;
    }
    .cell {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      background: var(--bg2);
      color: var(--text);
    }
    .cell.filled {
      border-color: var(--accent);
      background: var(--bg3);
    }
    .cell.blank {
      border-color: var(--bg3);
      background: var(--bg);
    }
    .cell.lit {
      background: var(--accent2) !important;
      border-color: var(--accent2) !important;
      color: var(--bg) !important;
    }
  </style>
</head>
<body>
  <div id="controls">
    <div id="mode-toggle">
      <button class="mode-btn active" id="btn-standard">STANDARD</button>
      <button class="mode-btn" id="btn-group">GROUP</button>
    </div>
    <button id="reroll-btn">&#x1F3B2; REROLL</button>
  </div>
  <div id="grid"></div>
  <script src="renderer.js"></script>
</body>
</html>
