<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Assets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+1+Code&family=Noto+Sans+JP&family=Zen+Kaku+Gothic+New&family=Dela+Gothic+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111111; --bg2: #1a1a1a; --bg3: #2a2a2a;
      --text: #cccccc; --text-dim: #888888;
      --accent: #44aaff; --accent2: #ffff44;
      --border: #333333; --success: #44ff44; --error: #ff5555;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      -webkit-app-region: drag;
    }
    h2 { font-size: 1rem; margin-bottom: 12px; color: var(--text-dim); }
    ul, li { -webkit-app-region: no-drag; }
    ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    li {
      padding: 8px 12px;
      background: var(--bg3);
      border-radius: 4px;
      cursor: grab;
      border: 1px solid var(--border);
      font-size: 0.9rem;
      transition: filter 0.15s, border-color 0.15s;
    }
    li:hover { filter: brightness(1.3); border-color: var(--accent); }
    li:active { cursor: grabbing; }
    li.folder-label {
      background: none; border: none;
      color: var(--accent);
      font-size: 0.8rem;
      padding: 12px 4px 2px;
      cursor: default;
    }
    li.folder-label:hover { filter: none; border: none; }
    .empty { color: var(--text-dim); font-size: 0.9rem; }
  </style>
</head>
<body>
  <h2>Assets フォルダ</h2>
  <ul id="file-list"></ul>
  <script src="renderer.js"></script>
</body>
</html>
