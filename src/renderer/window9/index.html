<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Font</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+1+Code&family=Noto+Sans+JP&family=Zen+Kaku+Gothic+New&family=Dela+Gothic+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111; --bg2: #1a1a1a; --bg3: #2a2a2a;
      --text: #ccc; --text-dim: #888;
      --accent: #44aaff; --accent2: #ffff44;
      --border: #333;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
    }
    h2 {
      font-size: 0.8rem;
      color: var(--text-dim);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #font-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px;
      overflow-y: auto;
      flex: 1;
      -webkit-app-region: no-drag;
    }
    .font-item {
      padding: 10px 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: var(--bg2);
      transition: border-color 0.15s;
    }
    .font-item:hover { border-color: var(--accent); }
    .font-item.selected { border-color: var(--accent); background: var(--bg3); }
    .font-name {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .font-preview {
      font-size: 1.1rem;
      color: var(--text);
    }
  </style>
</head>
<body>
  <h2>FONT</h2>
  <div id="font-list"></div>
  <script src="renderer.js"></script>
</body>
</html>
