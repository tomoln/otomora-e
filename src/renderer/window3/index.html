<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Log</title>
  <style>
    :root {
      --bg: #111111; --bg2: #1a1a1a; --bg3: #2a2a2a;
      --text: #cccccc; --text-dim: #888888;
      --accent: #44aaff; --accent2: #ffff44;
      --border: #333333; --success: #44ff44; --error: #ff5555;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: var(--bg);
      color: var(--text);
      padding: 8px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
    }
    #log-list, .log-entry { -webkit-app-region: no-drag; }
    h2 {
      font-size: 0.85rem;
      color: var(--text-dim);
      padding: 4px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    #log-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
    .log-entry { font-size: 0.82rem; padding: 2px 4px; }
    .log-entry .time { color: var(--border); margin-right: 8px; }
    .log-entry.success .msg { color: var(--success); }
    .log-entry.error .msg { color: var(--error); }
    .log-entry.info .msg { color: var(--text); }
  </style>
</head>
<body>
  <h2>LOG</h2>
  <div id="log-list"></div>
  <script src="renderer.js"></script>
</body>
</html>
