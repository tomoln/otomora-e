<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Text loader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+1+Code&family=Noto+Sans+JP&family=Zen+Kaku+Gothic+New&family=Dela+Gothic+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111111; --bg2: #1a1a1a; --bg3: #2a2a2a;
      --text: #cccccc; --text-dim: #888888;
      --accent: #44aaff; --accent2: #ffff44;
      --border: #333333; --success: #44ff44; --error: #ff5555;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DotGothic16', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
    }
    #stage { -webkit-app-region: no-drag; }
    #stage {
      writing-mode: vertical-rl;
      width: 100%;
      flex: 1;
      overflow: hidden;
      padding: 12px;
    }
    .token {
      font-size: 1.1rem;
      line-height: 1.8;
      white-space: nowrap;
    }
    .token.word {
      color: var(--accent);
      font-weight: bold;
    }
    .token.mora {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script src="renderer.js"></script>
</body>
</html>
