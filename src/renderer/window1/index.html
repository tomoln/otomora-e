<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Main</title>
  <style>
    :root {
      --bg: #111111; --bg2: #1a1a1a; --bg3: #2a2a2a;
      --text: #cccccc; --text-dim: #888888;
      --accent: #44aaff; --accent2: #ffff44;
      --border: #333333; --success: #44ff44; --error: #ff5555;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    h1 { font-size: 1.4rem; }
    #drop-zone {
      width: 480px; height: 240px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      color: var(--text-dim);
      transition: all 0.2s;
    }
    #drop-zone.over { border-color: var(--accent); color: var(--accent); background: var(--bg3); }
    #result { font-size: 0.95rem; min-height: 1.5em; }
    .ok { color: var(--success); }
    .ng { color: var(--error); }
  </style>
</head>
<body>
  <h1>Visualatch AudioTouch — Main</h1>
  <div id="drop-zone">ここにファイルをドロップ</div>
  <div id="result"></div>
  <script src="renderer.js"></script>
</body>
</html>
