<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Palette</title>
  <style>
    :root {
      --bg: #111; --bg2: #1a1a1a; --bg3: #2a2a2a;
      --text: #ccc; --text-dim: #888;
      --accent: #44aaff; --accent2: #ffff44;
      --border: #333;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
    }
    h2 {
      font-size: 0.8rem;
      color: var(--text-dim);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #palette-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px;
      overflow-y: auto;
      flex: 1;
      -webkit-app-region: no-drag;
    }
    .palette-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: var(--bg2);
      transition: border-color 0.15s;
    }
    .palette-item:hover { border-color: var(--accent); }
    .palette-item.selected { border-color: var(--accent); background: var(--bg3); }
    .palette-name { font-size: 0.82rem; flex: 1; }
    .swatches {
      display: flex;
      gap: 3px;
    }
    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h2>COLOR PALETTE</h2>
  <div id="palette-list"></div>
  <script src="renderer.js"></script>
</body>
</html>
